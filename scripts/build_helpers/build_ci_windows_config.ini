# Build Configuration for CFDesktop (Windows CI - MSVC)
# MSVC x86_64 build configuration for GitHub Actions CI

[cmake]
# CMake generator for Windows MSVC builds
generator=Visual Studio 17 2022

# Toolchain for CI MSVC builds
toolchain=windows/ci-msvc

# Build type: Release for CI/production
build_type=Release

[paths]
# Source directory (relative to project root, use "." for root)
source=.

# Build output directory (relative to project root)
build_dir=out/build_ci_windows

[options]
# Parallel jobs for compilation
jobs=16
