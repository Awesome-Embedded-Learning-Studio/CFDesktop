# Build Configuration for CFDesktop (Docker CI - Clang)
# Clang x86_64 build configuration for CI

[cmake]
# CMake generator for Linux containers
generator=Unix Makefiles

# Toolchain for CI Clang builds in Docker (x86_64)
toolchain=linux/ci-clang-x86_64

# Build type: Release for CI/production
build_type=Release

[paths]
# Source directory (relative to project root, use "." for root)
source=.

# Build output directory (relative to project root)
build_dir=out/build_ci_clang

[options]
# Parallel jobs for compilation
jobs=16
