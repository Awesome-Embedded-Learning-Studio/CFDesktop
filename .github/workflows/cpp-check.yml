name: C++ Check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-build-test:
    name: Linux build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg QT_ARCH=linux_gcc_64 \
            -f scripts/docker/Dockerfile.build \
            -t cfdesktop-build \
            .

      - name: Configure, build, and test
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -e QT_QPA_PLATFORM=offscreen \
            -v "$PWD:/project" \
            -w /project \
            cfdesktop-build \
            bash -lc "bash scripts/build_helpers/linux_develop_build.sh ci -c build_ci_config.ini && bash scripts/build_helpers/linux_run_tests.sh ci -c build_ci_config.ini"

  docs-build:
    name: VitePress docs build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build
